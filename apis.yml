aid: owasp
name: OWASP
description: >-
  The Open Worldwide Application Security Project (OWASP) is a nonprofit
  foundation that works to improve the security of software through
  community-led open source projects, hundreds of chapters worldwide,
  and educational resources. OWASP does not provide a centralized public
  API, but maintains many open source projects, standards (such as the
  OWASP Top 10 and ASVS), and tools (such as ZAP) that include APIs.
